<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaczkowa Melodia</title>
    <style>
        :root {
            --pink-bg: #FFE3EC;
            --pink-accent: #FFB3C6;
            --pink-dark: #FF85A2;
            --blue-bg: #E8F0FE;
            --blue-accent: #A0C4FF;
            --blue-dark: #4A90E2;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--pink-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #4A4A4A;
            box-sizing: border-box;
        }

        /* POPRAWKA MOBILNA: Stabilne tło, które nie rozciąga się i nie zmniejsza */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Ramka danych użytkownika */
        #auth-panel {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid var(--pink-accent);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(255, 133, 162, 0.2);
            margin-top: 40px;
            box-sizing: border-box;
        }

        #auth-panel h2 {
            margin-top: 0;
            color: var(--pink-dark);
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--pink-dark);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 3px solid var(--blue-accent);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: var(--blue-bg);
            color: #333;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--pink-dark);
        }

        /* Pasek statusu (Imię, Nazwisko, Timer) */
        #status-bar {
            display: none;
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid var(--blue-accent);
            border-radius: 15px;
            padding: 15px 30px;
            width: 100%;
            max-width: 650px;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: var(--blue-dark);
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        /* Główny kontener gry */
        #game-container {
            display: none;
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        /* Kontenery na przyciski sterujące audio */
        .controls-wrapper {
            display: inline-flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.85);
            padding: 12px 25px;
            border-radius: 50px;
            border: 3px solid var(--blue-accent);
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
        }

        .control-btn {
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .control-btn:hover {
            transform: scale(1.1);
        }

        #play-pause-button {
            background-color: var(--blue-accent);
        }
        #play-pause-button:hover {
            background-color: var(--blue-dark);
        }

        #stop-button {
            background-color: var(--pink-accent);
        }
        #stop-button:hover {
            background-color: var(--pink-dark);
        }

        /* Ikony SVG w przyciskach sterowania */
        .control-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        /* Sekcja Kaczek ułożonych poziomo */
        .ducks-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding: 10px;
        }

        /* Efekt powiększania dla całej karty kaczki */
        .duck-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100px;
            flex-shrink: 0;
            transition: transform 0.1s ease-in-out;
            user-select: none;
        }

        /* Delikatne powiększenie o 7% podczas kliknięcia na kaczkę lub głośnik */
        .duck-card:active {
            transform: scale(1.07);
        }

        .duck-img {
            width: 90px;
            height: 90px;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* Przycisk głośniczka pod kaczką */
        .speaker-btn {
            background-color: var(--pink-accent);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            pointer-events: none; 
        }

        .duck-card:hover .speaker-btn {
            background-color: var(--pink-dark);
        }

        .speaker-btn svg {
            width: 22px;
            height: 22px;
            fill: white;
        }

        /* Sekcja odpowiedzi */
        .answer-section {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            border: 4px solid var(--pink-accent);
            display: inline-block;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .answer-section h3 {
            margin-top: 0;
            color: var(--pink-dark);
            margin-bottom: 20px;
            font-size: 18px;
        }

        .inputs-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap; /* W razie bardzo małych ekranów okienka przejdą do nowej linii */
        }

        .note-input {
            width: 45px;
            height: 50px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            border: 3px solid var(--blue-accent);
            border-radius: 10px;
            background-color: var(--blue-bg);
            color: var(--blue-dark);
            outline: none;
        }

        .note-input:focus {
            border-color: var(--pink-dark);
        }

        /* Przyciski ogólne */
        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-start {
            background-color: var(--pink-dark);
            color: white;
            width: 100%;
        }

        .btn-start:hover {
            background-color: #FA6B8E;
        }

        .btn-check {
            background-color: var(--blue-accent);
            color: white;
        }

        .btn-check:hover {
            background-color: var(--blue-dark);
        }

        .btn-modal {
            background-color: var(--pink-dark);
            color: white;
            margin-top: 15px;
        }

        .btn-modal:hover {
            background-color: #FA6B8E;
        }

        /* Style dla Modali */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 85%;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .modal-success {
            border: 5px solid var(--blue-accent);
        }

        .modal-error {
            border: 5px solid var(--pink-accent);
        }

        .modal-content h2 {
            margin-top: 0;
            font-size: 26px;
        }

        .modal-success h2 { color: var(--blue-dark); }
        .modal-error h2 { color: var(--pink-dark); }

        .modal-content p {
            font-size: 16px;
            line-height: 1.5;
            color: #555;
        }

        .summary-info {
            background-color: var(--blue-bg);
            border-radius: 10px;
            padding: 12px;
            margin: 15px 0;
            font-weight: bold;
            color: var(--blue-dark);
            text-align: left;
        }

        /* RESPONSYWNOŚĆ: Dopasowanie elementów na smartfonach */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .ducks-wrapper {
                gap: 10px;
                justify-content: flex-start; /* Pozwala na płynne przesuwanie palcem na boki, jeśli ekran jest za mały */
                padding-bottom: 15px;
            }
            .duck-card {
                width: 75px; /* Delikatnie mniejsze karty */
            }
            .duck-img {
                width: 65px;
                height: 65px;
            }
            .speaker-btn {
                width: 36px;
                height: 36px;
            }
            .speaker-btn svg {
                width: 18px;
                height: 18px;
            }
            .note-input {
                width: 35px;
                height: 42px;
                font-size: 18px;
            }
            #status-bar {
                font-size: 15px;
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>

    <div id="success-modal" class="modal-overlay">
        <div class="modal-content modal-success">
            <h2>brawo!</h2>
            <p>prześlij ss do prowadzących</p>
            <div class="summary-info" id="success-summary">
                </div>
        </div>
    </div>

    <div id="error-modal" class="modal-overlay">
        <div class="modal-content modal-error">
            <h2>niestety...</h2>
            <p>nieprawidłowa sekwencja</p>
            <button class="btn btn-modal" onclick="closeErrorModalAndRestart()">spróbuj ponownie</button>
        </div>
    </div>

    <div id="auth-panel">
        <h2>Zagraj melodię kaczek!</h2>
        <div class="input-group">
            <label for="username">Imię i Nazwisko:</label>
            <input type="text" id="username" placeholder="Wpisz tutaj...">
        </div>
        <button class="btn btn-start" onclick="startGame()">START</button>
    </div>

    <div id="status-bar">
        <span id="display-identity">Gracz: </span>
        <span id="display-timer">Czas: 00:00</span>
    </div>

    <div id="game-container">
        
        <div class="controls-wrapper">
            <button id="play-pause-button" class="control-btn" onclick="togglePlayPause()" title="Odtwórz / Pauza">
                <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>

            </button>
            
            <button id="stop-button" class="control-btn" onclick="stopMelody()" title="Zatrzymaj i zresetuj">

        </div>

        <div class="ducks-wrapper">
            <div class="duck-card" onclick="playDuckSound(1)">
                <img src="kaczka.png" alt="Kaczka" class="duck-img">
                <button class="speaker-btn" title="Słuchaj">

                </button>
            </div>
            <div class="duck-card" onclick="playDuckSound(2)">
                <img src="kaczka.png" alt="Kaczka" class="duck-img">
                <button class="speaker-btn" title="Słuchaj">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>
            </div>
            <div class="duck-card" onclick="playDuckSound(3)">
                <img src="kaczka.png" alt="Kaczka" class="duck-img">
                <button class="speaker-btn" title="Słuchaj">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>

            <div class="duck-card" onclick="playDuckSound(4)">
                <img src="kaczka.png" alt="Kaczka" class="duck-img">
                <button class="speaker-btn" title="Słuchaj">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>

                <img src="kaczka.png" alt="Kaczka" class="duck-img">
                <button class="speaker-btn" title="Słuchaj">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>

                <img src="kaczka.png" alt="Kaczka" class="duck-img">
                <button class="speaker-btn" title="Słuchaj">
                    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>

        <div class="answer-section">
            <h3>wpisz poprawną kolejność usłyszanej melodii:</h3>
            <div class="inputs-container" id="inputs-container">
                </div>
            
            <button class="btn btn-check" onclick="checkAnswer()">sprawdź</button>
        </div>

    <script>
        const frequencies = {
            1: 261.63, // C4
            2: 293.66, // D4
            3: 329.63, // E4
            4: 349.23, // F4
            5: 392.00, // G4
            6: 440.00, // A4
            7: 493.88  // B4
        };

        let audioCtx = null;
        let timerInterval = null;
        let secretMelody = [];
        let finalTimeString = "00:00";

        let isPlaying = false;       
        let isPaused = false;        
        let currentNoteIndex = 0;    
        let melodyTimeoutId = null;  
        let generatedDurations = []; 

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playTrumpetTone(duckNumber, duration = 0.6) {
            initAudio();
            if (!frequencies[duckNumber]) return;

            const baseFreq = frequencies[duckNumber];
            const now = audioCtx.currentTime;

            const mainGain = audioCtx.createGain();
            mainGain.gain.setValueAtTime(0, now);
            mainGain.gain.linearRampToValueAtTime(0.25, now + 0.08); 
            mainGain.gain.setValueAtTime(0.25, now + duration - 0.1);
            mainGain.gain.exponentialRampToValueAtTime(0.001, now + duration);

            const harmonics = [
                { fMult: 1, gainVal: 1.0 },
                { fMult: 2, gainVal: 0.6 },
                { fMult: 3, gainVal: 0.4 },
                { fMult: 4, gainVal: 0.15 }
            ];

            harmonics.forEach(h => {
                const osc = audioCtx.createOscillator();
                const gNode = audioCtx.createGain();
                
                osc.type = 'sawtooth'; 
                osc.frequency.value = baseFreq * h.fMult;
                gNode.gain.setValueAtTime(h.gainVal, now);
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(baseFreq * 3, now);
                filter.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, now + duration);

                osc.connect(gNode);
                gNode.connect(filter);
                filter.connect(mainGain);

                osc.start(now);
                osc.stop(now + duration);
            });

            mainGain.connect(audioCtx.destination);
        }

        // Dźwięk triumfu generowany syntezatorem (szybki arpeggio akord dur)
        function playTriumphSound() {
            initAudio();
            const now = audioCtx.currentTime;
            const notes = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
            
            notes.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, now + (index * 0.1));
                
                gain.gain.setValueAtTime(0, now + (index * 0.1));
                gain.gain.linearRampToValueAtTime(0.3, now + (index * 0.1) + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + (index * 0.1));
                osc.stop(now + 1.2);
            });
        }

        // Dźwięk porażki "łełełe" (opadające, chropowate dźwięki)
        function playFailureSound() {
            initAudio();
            const now = audioCtx.currentTime;
            const steps = [220.00, 196.00, 174.61, 146.83]; // Opadające tony A3, G3, F3, D3
            
            steps.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(freq, now + (index * 0.25));
                osc.frequency.linearRampToValueAtTime(freq - 15, now + (index * 0.25) + 0.2);
                
                gain.gain.setValueAtTime(0, now + (index * 0.25));
                gain.gain.linearRampToValueAtTime(0.2, now + (index * 0.25) + 0.05);
                gain.gain.linearRampToValueAtTime(0.2, now + (index * 0.25) + 0.18);
                gain.gain.exponentialRampToValueAtTime(0.001, now + (index * 0.25) + 0.23);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + (index * 0.25));
                osc.stop(now + (index * 0.25) + 0.24);
            });
        }

        function playDuckSound(duckNumber) {
            if (isPlaying && !isPaused) {
                togglePlayPause(); 
            }
            playTrumpetTone(duckNumber, 0.5); 
        }

        window.onload = function() {
            buildInputFields();
            
            if (sessionStorage.getItem('game_active') === 'true') {
                document.getElementById('username').value = sessionStorage.getItem('game_username');
                
                if (!sessionStorage.getItem('game_start_time')) {
                    sessionStorage.setItem('game_start_time', Date.now());
                }
                
                showGameLayout();
                startTimer();
                generateNewMelody();
            }
        };

        function startGame() {
            const nameInput = document.getElementById('username').value.trim();
            if (nameInput === "") {
                alert("Proszę wpisać imię i nazwisko!");
                return;
            }

            sessionStorage.setItem('game_start_time', Date.now());
            sessionStorage.setItem('game_active', 'true');
            sessionStorage.setItem('game_username', nameInput);
            
            showGameLayout();
            startTimer();
            generateNewMelody();
        }

        function showGameLayout() {
            document.getElementById('auth-panel').style.display = 'none';
            document.getElementById('status-bar').style.display = 'flex';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('display-identity').innerText = "Gracz: " + sessionStorage.getItem('game_username');
        }

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            const startTime = parseInt(sessionStorage.getItem('game_start_time'));

            timerInterval = setInterval(() => {
                const elapsedMs = Date.now() - startTime;
                const totalSeconds = Math.floor(elapsedMs / 1000);
                
                const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
                const seconds = (totalSeconds % 60).toString().padStart(2, '0');
                
                finalTimeString = `${minutes}:${seconds}`;
                document.getElementById('display-timer').innerText = `Czas: ${finalTimeString}`;
            }, 1000);
        }

        function buildInputFields() {
            const container = document.getElementById('inputs-container');
            container.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'note-input';
                input.maxLength = 1;
                
                input.oninput = function() {
                    this.value = this.value.replace(/[^1-7]/g, '');
                    if (this.value.length === 1 && i < 8) {
                        container.children[i + 1].focus();
                    }
                };
                container.appendChild(input);
            }
        }

        function generateNewMelody() {
            secretMelody = [];
            generatedDurations = [];
            const noteDurations = [0.4, 0.6, 1.2]; 

            for (let i = 0; i < 9; i++) {
                let nextDuck;
                while (true) {
                    nextDuck = Math.floor(Math.random() * 7) + 1;
                    if (i >= 2 && secretMelody[i - 1] === nextDuck && secretMelody[i - 2] === nextDuck) {
                        continue; 
                    }
                    break; 
                }

                secretMelody.push(nextDuck);
                generatedDurations.push(noteDurations[Math.floor(Math.random() * noteDurations.length)]);
            }
            currentNoteIndex = 0;
            resetInterfaceToPlay();
            console.log("Melodia:", secretMelody);
        }

        function togglePlayPause() {
            initAudio();
            
            if (!isPlaying) {
                isPlaying = true;
                isPaused = false;
                updatePlayPauseIcons(true); 
                playNextNote();
            } else if (isPlaying && !isPaused) {
                isPaused = true;
                updatePlayPauseIcons(false); 
                if (melodyTimeoutId) clearTimeout(melodyTimeoutId);
            } else if (isPlaying && isPaused) {
                isPaused = false;
                updatePlayPauseIcons(true); 
                playNextNote();
            }
        }

        function playNextNote() {
            if (isPaused || !isPlaying) return;

            if (currentNoteIndex >= secretMelody.length) {
                stopMelody();
                return;
            }

            const duck = secretMelody[currentNoteIndex];
            const duration = generatedDurations[currentNoteIndex];

            playTrumpetTone(duck, duration);
            const totalStepTime = (duration * 1000) + 300;
            currentNoteIndex++;

            melodyTimeoutId = setTimeout(() => {
                playNextNote();
            }, totalStepTime);
        }

        function stopMelody() {
            if (melodyTimeoutId) clearTimeout(melodyTimeoutId);
            
            isPlaying = false;
            isPaused = false;
            currentNoteIndex = 0; 
            
            resetInterfaceToPlay();
        }

        function updatePlayPauseIcons(shouldShowPause) {
            const playIcon = document.getElementById('icon-play');
            const pauseIcon = document.getElementById('icon-pause');
            
            if (shouldShowPause) {
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        }

        function resetInterfaceToPlay() {
            updatePlayPauseIcons(false);
        }

        function checkAnswer() {
            const inputs = document.querySelectorAll('.note-input');
            let playerAnswer = [];

            for (let input of inputs) {
                if (input.value === "") {
                    alert("Wypełnij wszystkie 9 okienek przed sprawdzeniem!");
                    return;
                }
                playerAnswer.push(parseInt(input.value));
            }

            const isCorrect = playerAnswer.length === secretMelody.length && 
                              playerAnswer.every((val, index) => val === secretMelody[index]);

            if (isCorrect) {
                clearInterval(timerInterval); 
                stopMelody();
                playTriumphSound(); 
                
                const username = sessionStorage.getItem('game_username');
                document.getElementById('success-summary').innerHTML = `
                    Gracz: ${username}<br>
                    Końcowy czas: ${finalTimeString}
                `;
                document.getElementById('success-modal').style.display = 'flex';
            } else {
                stopMelody();
                playFailureSound(); 
                document.getElementById('error-modal').style.display = 'flex';
            }
        }

        function closeErrorModalAndRestart() {
            document.getElementById('error-modal').style.display = 'none';
            
            const inputs = document.querySelectorAll('.note-input');
            inputs.forEach(input => input.value = "");
            
            generateNewMelody();
            togglePlayPause();
        }
    </script>
</body>
</html>
