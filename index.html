<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaczkowa Melodia</title>
    <style>
        :root {
            --pink-bg: #FFE3EC;
            --pink-accent: #FFB3C6;
            --pink-dark: #FF85A2;
            --blue-bg: #E8F0FE;
            --blue-accent: #A0C4FF;
            --blue-dark: #4A90E2;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--pink-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #4A4A4A;
            box-sizing: border-box;
            padding: 20px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        #auth-panel {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid var(--pink-accent);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(255, 133, 162, 0.2);
            box-sizing: border-box;
        }

        #auth-panel h2 {
            margin-top: 0;
            color: var(--pink-dark);
            font-size: 28px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--pink-dark);
            font-size: 18px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 3px solid var(--blue-accent);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 18px;
            background-color: var(--blue-bg);
            color: #333;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--pink-dark);
        }

        #status-bar {
            display: none !important;
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid var(--blue-accent);
            border-radius: 15px;
            padding: 12px 25px;
            width: 100%;
            max-width: 750px;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: var(--blue-dark);
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        #game-container {
            display: none !important;
            width: 100%;
            max-width: 1000px;
            text-align: center;
            height: calc(100% - 80px);
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .controls-wrapper {
            display: inline-flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.85);
            padding: 10px 25px;
            border-radius: 50px;
            border: 3px solid var(--blue-accent);
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        .control-btn {
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .control-btn:hover {
            transform: scale(1.1);
        }

        #play-button { background-color: var(--blue-accent); }
        #play-button:hover { background-color: var(--blue-dark); }
        #stop-button { background-color: var(--pink-accent); }
        #stop-button:hover { background-color: var(--pink-dark); }

        .control-btn svg { width: 24px; height: 24px; fill: white; }

        .ducks-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
            flex-grow: 1;
            align-items: center;
        }

        .duck-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 130px;
            flex-shrink: 0;
            transition: transform 0.1s ease-in-out;
            user-select: none;
            cursor: pointer;
        }

        .duck-card:active { transform: scale(1.07); }

        .duck-img { width: 110px; height: 110px; object-fit: contain; user-select: none; -webkit-user-drag: none; }

        .speaker-btn {
            background-color: var(--pink-accent);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            pointer-events: none; 
        }

        .duck-card:hover .speaker-btn { background-color: var(--pink-dark); }
        .speaker-btn svg { width: 22px; height: 22px; fill: white; }

        .answer-section {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px 30px;
            border-radius: 20px;
            border: 4px solid var(--pink-accent);
            display: inline-block;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
            flex-shrink: 0;
            margin-bottom: 10px;
        }

        .answer-section h3 { margin-top: 0; color: var(--pink-dark); margin-bottom: 15px; font-size: 18px; }

        .inputs-container {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: nowrap; 
        }

        .note-input {
            width: 50px !important;
            height: 50px !important;
            padding: 0 !important;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border: 3px solid var(--blue-accent);
            border-radius: 12px;
            background-color: var(--blue-bg);
            color: var(--blue-dark);
            outline: none;
            box-sizing: border-box;
            flex-shrink: 0;
            line-height: 50px;
        }

        .note-input:focus { border-color: var(--pink-dark); }

        .btn { padding: 14px 40px; font-size: 18px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; transition: transform 0.1s, background-color 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn:active { transform: scale(0.98); }
        .btn-start { background-color: var(--pink-dark); color: white; width: 100%; }
        .btn-check { background-color: var(--blue-accent); color: white; width: 100%; max-width: 250px; padding: 12px 25px; }
        .btn-modal { background-color: var(--pink-dark); color: white; margin-top: 15px; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 400px; width: 85%; box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        .modal-success { border: 5px solid var(--blue-accent); }
        .modal-error { border: 5px solid var(--pink-accent); }
        .summary-info { background-color: var(--blue-bg); border-radius: 10px; padding: 12px; margin: 15px 0; font-weight: bold; color: var(--blue-dark); text-align: left; }

        /* WIDOK MOBILNY */
        @media (max-width: 768px) {
            body {
                justify-content: flex-start;
                padding: 8px 5px;
                overflow: hidden;
            }
            #auth-panel {
                padding: 30px;
                max-width: 380px;
            }
            #auth-panel h2 { font-size: 24px; margin-bottom: 20px; }
            label { font-size: 16px; margin-bottom: 8px; }
            input[type="text"] { padding: 12px; font-size: 16px; }
            
            #game-container {
                height: calc(100% - 30px);
                flex-grow: 1;
                justify-content: space-between;
            }

            /* Zachowany oryginalny, pionowy układ kaczek pod sobą */
            .ducks-wrapper {
                flex-direction: column !important;
                display: flex !important;
                justify-content: center;
                align-items: center;
                gap: 5px;
                flex-grow: 1;
                margin-bottom: 5px;
                padding: 0;
                overflow: hidden;
                width: 100%;
                transition: none;
            }

            /* Zwiększone i wyeksponowane karty kaczek */
            .duck-card {
                flex-direction: row;
                justify-content: center;
                align-items: center;
                gap: 14px;
                padding: 6px 20px;
                background: rgba(255, 255, 255, 0.6);
                border-radius: 12px;
                border: 2px dashed var(--pink-accent);
                width: 160px;
                height: auto;
            }

            /* Duże, wyraźne grafiki PNG */
            .duck-img {
                width: 48px;
                height: 48px;
            }

            /* Większe przyciski głośników przy kaczce */
            .speaker-btn {
                display: flex !important;
                width: 36px;
                height: 36px;
            }
            .speaker-btn svg {
                width: 18px;
                height: 18px;
            }

            /* Małe, zgrabne pole tekstowe, które bez problemu mieści cyfry i nie zabiera miejsca w pionie */
            .note-input { 
                width: 24px !important; 
                height: 24px !important; 
                font-size: 14px; 
                line-height: 24px; 
                border: 2px solid var(--blue-accent); 
                border-radius: 6px; 
            }
            
            .answer-section { 
                padding: 10px; 
                max-width: 100%; 
                margin-bottom: 5px;
                transition: all 0.2s ease;
                border-radius: 14px;
                border-width: 2px;
            }
            .answer-section h3 {
                margin-bottom: 6px;
                font-size: 13px;
            }
            .inputs-container { gap: 4px; margin-bottom: 8px; }
            .btn-check { padding: 8px 20px; font-size: 14px; max-width: 180px; }
            .controls-wrapper { margin-bottom: 5px; padding: 6px 15px; }
            .control-btn { width: 38px; height: 38px; }
            .control-btn svg { width: 16px; height: 16px; }
            #status-bar { padding: 6px 15px; font-size: 14px; margin-bottom: 5px; }

            /* Pozycjonowanie sekcji wpisywania od razu nad klawiaturą, kaczki zostają na swoim miejscu */
            body.keyboard-active #game-container {
                justify-content: flex-start;
            }
            body.keyboard-active #status-bar,
            body.keyboard-active .controls-wrapper,
            body.keyboard-active .answer-section h3 {
                display: none !important; /* Ukrywa nagłówki i sterowanie przy aktywnej klawiaturze, by zmieścić resztę bez scrolla */
            }
            body.keyboard-active .answer-section {
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                border-radius: 0;
                border-left: none;
                border-right: none;
                border-bottom: none;
                background: rgba(255, 255, 255, 0.98);
                box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
                padding: 6px 0;
                z-index: 99;
                margin-bottom: 0;
            }
            body.keyboard-active .btn-check {
                padding: 4px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div id="success-modal" class="modal-overlay">
        <div class="modal-content modal-success">
            <h2>brawo!</h2>
            <p>prześlij ss do prowadzących</p>
            <div class="summary-info" id="success-summary"></div>
        </div>
    </div>

    <div id="error-modal" class="modal-overlay">
        <div class="modal-content modal-error">
            <h2>niestety...</h2>
            <p>nieprawidłowa sekwencja</p>
            <button class="btn btn-modal" onclick="closeErrorModalAndRestart()">spróbuj ponownie</button>
        </div>
    </div>

    <div id="auth-panel">
        <h2>Zagraj melodię kaczek!</h2>
        <div class="input-group">
            <label for="username">Imię i Nazwisko:</label>
            <input type="text" id="username" placeholder="Wpisz tutaj...">
        </div>
        <button class="btn btn-start" onclick="startGame()">START</button>
    </div>

    <div id="status-bar">
        <span id="display-identity">Gracz: </span>
        <span id="display-timer">Czas: 00:00</span>
    </div>

    <div id="game-container">
        <div class="controls-wrapper">
            <button id="play-button" class="control-btn" onclick="tryPlayMelody()" title="Odtwórz">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button id="stop-button" class="control-btn" onclick="stopMelody()" title="Zatrzymaj">
                <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
            </button>
        </div>

        <div class="ducks-wrapper">
            <div class="duck-card" onclick="playDuckSound(1)"><img src="kaczka.png" class="duck-img"><button class="speaker-btn"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button></div>
            <div class="duck-card" onclick="playDuckSound(2)"><img src="kaczka.png" class="duck-img"><button class="speaker-btn"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button></div>
            <div class="duck-card" onclick="playDuckSound(3)"><img src="kaczka.png" class="duck-img"><button class="speaker-btn"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button></div>
            <div class="duck-card" onclick="playDuckSound(4)"><img src="kaczka.png" class="duck-img"><button class="speaker-btn"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button></div>
            <div class="duck-card" onclick="playDuckSound(5)"><img src="kaczka.png" class="duck-img"><button class="speaker-btn"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button></div>
            <div class="duck-card" onclick="playDuckSound(6)"><img src="kaczka.png" class="duck-img"><button class="speaker-btn"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button></div>
            <div class="duck-card" onclick="playDuckSound(7)"><img src="kaczka.png" class="duck-img"><button class="speaker-btn"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button></div>
        </div>

        <div class="answer-section">
            <h3>wpisz poprawną kolejność usłyszanej melodii:</h3>
            <div class="inputs-container" id="inputs-container"></div>
            <button class="btn btn-check" onclick="checkAnswer()">sprawdź</button>
        </div>
    </div>

    <script>
        const frequencies = { 1: 261.63, 2: 293.66, 3: 329.63, 4: 349.23, 5: 392.00, 6: 440.00, 7: 493.88 };
        let audioCtx = null, timerInterval = null, secretMelody = [], finalTimeString = "00:00";
        let isPlaying = false, currentNoteIndex = 0, melodyTimeoutId = null;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playTrumpetTone(duckNumber, duration = 0.6) {
            initAudio(); if (!frequencies[duckNumber]) return;
            const baseFreq = frequencies[duckNumber], now = audioCtx.currentTime;
            const mainGain = audioCtx.createGain();
            mainGain.gain.setValueAtTime(0, now); mainGain.gain.linearRampToValueAtTime(0.25, now + 0.08);
            mainGain.gain.setValueAtTime(0.25, now + duration - 0.1); mainGain.gain.exponentialRampToValueAtTime(0.001, now + duration);
            [1, 2, 3, 4].forEach(h => {
                const osc = audioCtx.createOscillator(); const gNode = audioCtx.createGain();
                osc.type = 'sawtooth'; osc.frequency.value = baseFreq * h;
                gNode.gain.value = [1.0, 0.6, 0.4, 0.15][h-1] * 0.5;
                osc.connect(gNode); gNode.connect(mainGain); osc.start(now); osc.stop(now + duration);
            });
            mainGain.connect(audioCtx.destination);
        }
        function playTriumphSound() { initAudio(); const now = audioCtx.currentTime; [261.63, 329.63, 392.00, 523.25].forEach((f, i) => { const o = audioCtx.createOscillator(); o.type='triangle'; o.frequency.value=f; o.connect(audioCtx.destination); o.start(now + i*0.1); o.stop(now + i*0.1 + 0.3); }); }
        function playFailureSound() { initAudio(); const now = audioCtx.currentTime; [220.00, 196.00, 174.61, 146.83].forEach((f, i) => { const o = audioCtx.createOscillator(); o.type='sawtooth'; o.frequency.value=f; o.connect(audioCtx.destination); o.start(now + i*0.2); o.stop(now + i*0.2 + 0.2); }); }
        function playDuckSound(n) { stopMelody(); playTrumpetTone(n, 0.5); }
        window.onload = function() { buildInputFields(); if (sessionStorage.getItem('game_active') === 'true') { document.getElementById('username').value = sessionStorage.getItem('game_username'); showGameLayout(); startTimer(); generateNewMelody(); } };
        function startGame() { const n = document.getElementById('username').value.trim(); if (!n) return alert("Wpisz imię!"); sessionStorage.setItem('game_start_time', Date.now()); sessionStorage.setItem('game_active', 'true'); sessionStorage.setItem('game_username', n); showGameLayout(); startTimer(); generateNewMelody(); }
        function showGameLayout() { document.getElementById('auth-panel').style.display = 'none'; document.getElementById('status-bar').style.setProperty('display', 'flex', 'important'); document.getElementById('game-container').style.setProperty('display', 'flex', 'important'); document.getElementById('display-identity').innerText = "Gracz: " + sessionStorage.getItem('game_username'); }
        function startTimer() { if(timerInterval) clearInterval(timerInterval); const startTime = parseInt(sessionStorage.getItem('game_start_time')); timerInterval = setInterval(() => { const totalSeconds = Math.floor((Date.now() - startTime) / 1000); finalTimeString = `${Math.floor(totalSeconds/60).toString().padStart(2,'0')}:${(totalSeconds%60).toString().padStart(2,'0')}`; document.getElementById('display-timer').innerText = `Czas: ${finalTimeString}`; }, 1000); }
        
        function buildInputFields() { 
            const c = document.getElementById('inputs-container'); 
            c.innerHTML = ''; 
            for (let i = 0; i < 9; i++) { 
                const input = document.createElement('input'); 
                input.type = 'text'; 
                input.pattern = '[1-7]*'; 
                input.inputMode = 'numeric'; 
                input.className = 'note-input'; 
                input.maxLength = 1; 
                
                // Obsługa wysuwania widoku przy klawiaturze
                input.addEventListener('focus', () => {
                    document.body.classList.add('keyboard-active');
                });
                input.addEventListener('blur', () => {
                    // Timeout chroni przed miganiem przy przeskakiwaniu z inputa do inputa
                    setTimeout(() => {
                        if (document.activeElement.className !== 'note-input') {
                            document.body.classList.remove('keyboard-active');
                        }
                    }, 50);
                });

                input.oninput = function() { 
                    this.value = this.value.replace(/[^1-7]/g, ''); 
                    if (this.value.length === 1 && i < 8) c.children[i + 1].focus(); 
                }; 
                c.appendChild(input); 
            } 
        }

        function generateNewMelody() { 
            secretMelody = []; 
            while (true) {
                secretMelody = [];
                for (let i = 0; i < 9; i++) { 
                    secretMelody.push(Math.floor(Math.random() * 7) + 1); 
                }
                const uniqueNotes = new Set(secretMelody);
                if (uniqueNotes.size >= 6) {
                    break;
                }
            }
            stopMelody(); 
        }
        function tryPlayMelody() { if (isPlaying) return; isPlaying = true; currentNoteIndex = 0; playNextNote(); }
        function playNextNote() { if (!isPlaying) return; if (currentNoteIndex >= secretMelody.length) { isPlaying = false; return; } playTrumpetTone(secretMelody[currentNoteIndex], 0.6); currentNoteIndex++; melodyTimeoutId = setTimeout(playNextNote, 900); }
        function stopMelody() { clearTimeout(melodyTimeoutId); isPlaying = false; currentNoteIndex = 0; }
        function checkAnswer() { const ins = document.querySelectorAll('.note-input'); let ans = []; for (let i of ins) { if (!i.value) return alert("Wypełnij wszystko!"); ans.push(parseInt(i.value)); } if (ans.every((v, i) => v === secretMelody[i])) { clearInterval(timerInterval); stopMelody(); playTriumphSound(); document.getElementById('success-summary').innerHTML = `Gracz: ${sessionStorage.getItem('game_username')}<br>Czas: ${finalTimeString}`; document.getElementById('success-modal').style.display = 'flex'; } else { stopMelody(); playFailureSound(); document.getElementById('error-modal').style.display = 'flex'; } }
        function closeErrorModalAndRestart() { document.getElementById('error-modal').style.display = 'none'; document.querySelectorAll('.note-input').forEach(i => i.value = ""); generateNewMelody(); }
    </script>
</body>
</html>
