<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaczkowa Melodia</title>
    <style>
        :root {
            --pink-bg: #FFE3EC;
            --pink-accent: #FFB3C6;
            --pink-dark: #FF85A2;
            --blue-bg: #E8F0FE;
            --blue-accent: #A0C4FF;
            --blue-dark: #4A90E2;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--pink-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #4A4A4A;
            box-sizing: border-box;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        #auth-panel {
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid var(--pink-accent);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(255, 133, 162, 0.2);
            margin-top: 40px;
            box-sizing: border-box;
        }

        #auth-panel h2 {
            margin-top: 0;
            color: var(--pink-dark);
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--pink-dark);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 3px solid var(--blue-accent);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: var(--blue-bg);
            color: #333;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--pink-dark);
        }

        #status-bar {
            display: none;
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid var(--blue-accent);
            border-radius: 15px;
            padding: 15px 30px;
            width: 100%;
            max-width: 650px;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: var(--blue-dark);
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        #game-container {
            display: none;
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        .controls-wrapper {
            display: inline-flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.85);
            padding: 12px 25px;
            border-radius: 50px;
            border: 3px solid var(--blue-accent);
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
        }

        .control-btn {
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .control-btn:hover {
            transform: scale(1.1);
        }

        #play-pause-button { background-color: var(--blue-accent); }
        #play-pause-button:hover { background-color: var(--blue-dark); }
        #stop-button { background-color: var(--pink-accent); }
        #stop-button:hover { background-color: var(--pink-dark); }

        .control-btn svg { width: 24px; height: 24px; fill: white; }

        .ducks-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding: 10px;
        }

        .duck-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100px;
            flex-shrink: 0;
            transition: transform 0.1s ease-in-out;
            user-select: none;
        }

        .duck-card:active { transform: scale(1.07); }

        .duck-img { width: 90px; height: 90px; object-fit: contain; user-select: none; -webkit-user-drag: none; }

        .speaker-btn {
            background-color: var(--pink-accent);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            pointer-events: none; 
        }

        .duck-card:hover .speaker-btn { background-color: var(--pink-dark); }
        .speaker-btn svg { width: 22px; height: 22px; fill: white; }

        .answer-section {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            border: 4px solid var(--pink-accent);
            display: inline-block;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .answer-section h3 { margin-top: 0; color: var(--pink-dark); margin-bottom: 20px; font-size: 18px; }

        .inputs-container {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: nowrap; 
        }

        /* NAPRAWIONE OKIENKA */
        .note-input {
            width: 38px !important;
            height: 38px !important;
            padding: 0 !important;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            border: 3px solid var(--blue-accent);
            border-radius: 10px;
            background-color: var(--blue-bg);
            color: var(--blue-dark);
            outline: none;
            box-sizing: border-box;
            flex-shrink: 0;
            line-height: 38px;
        }

        .note-input:focus { border-color: var(--pink-dark); }

        .btn { padding: 12px 30px; font-size: 16px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; transition: transform 0.1s, background-color 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn:active { transform: scale(0.98); }
        .btn-start { background-color: var(--pink-dark); color: white; width: 100%; }
        .btn-check { background-color: var(--blue-accent); color: white; }
        .btn-modal { background-color: var(--pink-dark); color: white; margin-top: 15px; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 400px; width: 85%; box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        .modal-success { border: 5px solid var(--blue-accent); }
        .modal-error { border: 5px solid var(--pink-accent); }
        .summary-info { background-color: var(--blue-bg); border-radius: 10px; padding: 12px; margin: 15px 0; font-weight: bold; color: var(--blue-dark); text-align: left; }

        @media (max-width: 768px) {
            .note-input { width: 32px !important; height: 32px !important; font-size: 16px; line-height: 32px; border: 2px solid var(--blue-accent); border-radius: 8px; }
            .answer-section { padding: 20px 10px; max-width: 100%; }
            .inputs-container { gap: 4px; }
        }
    </style>
</head>
<body>

    <div id="success-modal" class="modal-overlay">
        <div class="modal-content modal-success">
            <h2>brawo!</h2>
            <p>prześlij ss do prowadzących</p>
            <div class="summary-info" id="success-summary"></div>
        </div>
    </div>

    <div id="error-modal" class="modal-overlay">
        <div class="modal-content modal-error">
            <h2>niestety...</h2>
            <p>nieprawidłowa sekwencja</p>
            <button class="btn btn-modal" onclick="closeErrorModalAndRestart()">spróbuj ponownie</button>
        </div>
    </div>

    <div id="auth-panel">
        <h2>Zagraj melodię kaczek!</h2>
        <div class="input-group">
            <label for="username">Imię i Nazwisko:</label>
            <input type="text" id="username" placeholder="Wpisz tutaj...">
        </div>
        <button class="btn btn-start" onclick="startGame()">START</button>
    </div>

    <div id="status-bar">
        <span id="display-identity">Gracz: </span>
        <span id="display-timer">Czas: 00:00</span>
    </div>

    <div id="game-container">
        <div class="controls-wrapper">
            <button id="play-pause-button" class="control-btn" onclick="togglePlayPause()" title="Odtwórz / Pauza">
                <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button id="stop-button" class="control-btn" onclick="stopMelody()" title="Zatrzymaj i zresetuj">
                <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
            </button>
        </div>

        <div class="ducks-wrapper">
            <div class="duck-card" onclick="playDuckSound(1)"><img src="kaczka.png" class="duck-img"><button class="speaker-btn"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button></div>
            <div class="duck-card" onclick="playDuckSound(2)"><img src="kaczka.png" class="duck-img"><button class="speaker-btn"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button></div>
            <div class="duck-card" onclick="playDuckSound(3)"><img src="kaczka.png" class="duck-img"><button class="speaker-btn"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button></div>
            <div class="duck-card" onclick="playDuckSound(4)"><img src="kaczka.png" class="duck-img"><button class="speaker-btn"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button></div>
            <div class="duck-card" onclick="playDuckSound(5)"><img src="kaczka.png" class="duck-img"><button class="speaker-btn"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button></div>
            <div class="duck-card" onclick="playDuckSound(6)"><img src="kaczka.png" class="duck-img"><button class="speaker-btn"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button></div>
            <div class="duck-card" onclick="playDuckSound(7)"><img src="kaczka.png" class="duck-img"><button class="speaker-btn"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button></div>
        </div>

        <div class="answer-section">
            <h3>wpisz poprawną kolejność usłyszanej melodii:</h3>
            <div class="inputs-container" id="inputs-container"></div>
            <button class="btn btn-check" onclick="checkAnswer()">sprawdź</button>
        </div>
    </div>

    <script>
        const frequencies = { 1: 261.63, 2: 293.66, 3: 329.63, 4: 349.23, 5: 392.00, 6: 440.00, 7: 493.88 };
        let audioCtx = null, timerInterval = null, secretMelody = [], finalTimeString = "00:00";
        let isPlaying = false, isPaused = false, currentNoteIndex = 0, melodyTimeoutId = null, generatedDurations = [];

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playTrumpetTone(duckNumber, duration = 0.6) {
            initAudio(); if (!frequencies[duckNumber]) return;
            const baseFreq = frequencies[duckNumber], now = audioCtx.currentTime;
            const mainGain = audioCtx.createGain();
            mainGain.gain.setValueAtTime(0, now); mainGain.gain.linearRampToValueAtTime(0.25, now + 0.08);
            mainGain.gain.setValueAtTime(0.25, now + duration - 0.1); mainGain.gain.exponentialRampToValueAtTime(0.001, now + duration);
            [1, 2, 3, 4].forEach(h => {
                const osc = audioCtx.createOscillator(); const gNode = audioCtx.createGain();
                osc.type = 'sawtooth'; osc.frequency.value = baseFreq * h;
                gNode.gain.value = [1.0, 0.6, 0.4, 0.15][h-1] * 0.5;
                osc.connect(gNode); gNode.connect(mainGain); osc.start(now); osc.stop(now + duration);
            });
            mainGain.connect(audioCtx.destination);
        }
        function playTriumphSound() { initAudio(); const now = audioCtx.currentTime; [261.63, 329.63, 392.00, 523.25].forEach((f, i) => { const o = audioCtx.createOscillator(); o.type='triangle'; o.frequency.value=f; o.connect(audioCtx.destination); o.start(now + i*0.1); o.stop(now + i*0.1 + 0.3); }); }
        function playFailureSound() { initAudio(); const now = audioCtx.currentTime; [220.00, 196.00, 174.61, 146.83].forEach((f, i) => { const o = audioCtx.createOscillator(); o.type='sawtooth'; o.frequency.value=f; o.connect(audioCtx.destination); o.start(now + i*0.2); o.stop(now + i*0.2 + 0.2); }); }
        function playDuckSound(n) { if (isPlaying && !isPaused) togglePlayPause(); playTrumpetTone(n, 0.5); }
        window.onload = function() { buildInputFields(); if (sessionStorage.getItem('game_active') === 'true') { document.getElementById('username').value = sessionStorage.getItem('game_username'); showGameLayout(); startTimer(); generateNewMelody(); } };
        function startGame() { const n = document.getElementById('username').value.trim(); if (!n) return alert("Wpisz imię!"); sessionStorage.setItem('game_start_time', Date.now()); sessionStorage.setItem('game_active', 'true'); sessionStorage.setItem('game_username', n); showGameLayout(); startTimer(); generateNewMelody(); }
        function showGameLayout() { document.getElementById('auth-panel').style.display = 'none'; document.getElementById('status-bar').style.display = 'flex'; document.getElementById('game-container').style.display = 'block'; document.getElementById('display-identity').innerText = "Gracz: " + sessionStorage.getItem('game_username'); }
        function startTimer() { if(timerInterval) clearInterval(timerInterval); const startTime = parseInt(sessionStorage.getItem('game_start_time')); timerInterval = setInterval(() => { const totalSeconds = Math.floor((Date.now() - startTime) / 1000); finalTimeString = `${Math.floor(totalSeconds/60).toString().padStart(2,'0')}:${(totalSeconds%60).toString().padStart(2,'0')}`; document.getElementById('display-timer').innerText = `Czas: ${finalTimeString}`; }, 1000); }
        function buildInputFields() { const c = document.getElementById('inputs-container'); c.innerHTML = ''; for (let i = 0; i < 9; i++) { const input = document.createElement('input'); input.type = 'text'; input.className = 'note-input'; input.maxLength = 1; input.oninput = function() { this.value = this.value.replace(/[^1-7]/g, ''); if (this.value.length === 1 && i < 8) c.children[i + 1].focus(); }; c.appendChild(input); } }
        function generateNewMelody() { secretMelody = []; generatedDurations = []; for (let i = 0; i < 9; i++) { secretMelody.push(Math.floor(Math.random() * 7) + 1); generatedDurations.push(0.6); } currentNoteIndex = 0; resetInterfaceToPlay(); }
        function togglePlayPause() { initAudio(); if (!isPlaying) { isPlaying = true; isPaused = false; updatePlayPauseIcons(true); playNextNote(); } else if (!isPaused) { isPaused = true; updatePlayPauseIcons(false); clearTimeout(melodyTimeoutId); } else { isPaused = false; updatePlayPauseIcons(true); playNextNote(); } }
        function playNextNote() { if (isPaused || !isPlaying) return; if (currentNoteIndex >= secretMelody.length) { stopMelody(); return; } playTrumpetTone(secretMelody[currentNoteIndex], generatedDurations[currentNoteIndex]); currentNoteIndex++; melodyTimeoutId = setTimeout(playNextNote, 900); }
        function stopMelody() { clearTimeout(melodyTimeoutId); isPlaying = false; isPaused = false; currentNoteIndex = 0; resetInterfaceToPlay(); }
        function updatePlayPauseIcons(p) { document.getElementById('icon-play').style.display = p ? 'none' : 'block'; document.getElementById('icon-pause').style.display = p ? 'block' : 'none'; }
        function resetInterfaceToPlay() { updatePlayPauseIcons(false); }
        function checkAnswer() { const ins = document.querySelectorAll('.note-input'); let ans = []; for (let i of ins) { if (!i.value) return alert("Wypełnij wszystko!"); ans.push(parseInt(i.value)); } if (ans.every((v, i) => v === secretMelody[i])) { clearInterval(timerInterval); stopMelody(); playTriumphSound(); document.getElementById('success-summary').innerHTML = `Gracz: ${sessionStorage.getItem('game_username')}<br>Czas: ${finalTimeString}`; document.getElementById('success-modal').style.display = 'flex'; } else { stopMelody(); playFailureSound(); document.getElementById('error-modal').style.display = 'flex'; } }
        function closeErrorModalAndRestart() { document.getElementById('error-modal').style.display = 'none'; document.querySelectorAll('.note-input').forEach(i => i.value = ""); generateNewMelody(); }
    </script>
</body>
</html>
